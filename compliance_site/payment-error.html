<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödəniş Xətası</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #fef2f2; color: #991b1b; text-align: center; }
        .container { padding: 40px; border-radius: 16px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

    <div class="container">
        <div class="icon">❌</div>
        <h1>Ödəniş baş tutmadı</h1>
        <p>Xəta baş verdi və ya ödəniş ləğv edildi. Zəhmət olmasa tətbiqə qayıdın.</p>
        <!-- Mobil tətbiqdəki WebView bu səhifəni görən kimi avtomatik bağlanacaq -->
    </div>

</html>
