workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      android_signing:
        - keystore_reference
      groups:
        - app_credentials
      vars:
        PACKAGE_NAME: "com.is.tap"
      flutter: stable
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/azerbaijan_job_marketplace/android/local.properties"
      - name: Get Flutter packages
        script: |
          cd azerbaijan_job_marketplace
          flutter packages pub get
      - name: Flutter analyze
        script: |
          cd azerbaijan_job_marketplace
          flutter analyze
      - name: Build AAB with environment variables
        script: |
          cd azerbaijan_job_marketplace
          flutter build appbundle --release \
            --dart-define=AZURE_TTS_API_KEY=$AZURE_TTS_API_KEY \
            --dart-define=GITHUB_API_KEY=$GITHUB_API_KEY
    artifacts:
      - azerbaijan_job_marketplace/build/**/outputs/**/*.aab
      - azerbaijan_job_marketplace/build/**/outputs/**/mapping.txt
      - azerbaijan_job_marketplace/flutter_drive.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.is.tap
      groups:
        - app_credentials
      vars:
        BUNDLE_ID: "com.is.tap"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          cd azerbaijan_job_marketplace/ios
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd azerbaijan_job_marketplace
          flutter packages pub get
      - name: Install pods
        script: |
          cd azerbaijan_job_marketplace/ios
          pod install
      - name: Flutter build ipa
        script: |
          cd azerbaijan_job_marketplace
          flutter build ipa --release \
            --dart-define=AZURE_TTS_API_KEY=$AZURE_TTS_API_KEY \
            --dart-define=GITHUB_API_KEY=$GITHUB_API_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - azerbaijan_job_marketplace/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - azerbaijan_job_marketplace/flutter_drive.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App Beta Testers
        submit_to_app_store: false
