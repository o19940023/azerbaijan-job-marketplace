workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      android_signing:
        - keystore_reference
      groups:
        - app_credentials
      vars:
        PACKAGE_NAME: "com.is.tap"
      flutter: stable
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Build AAB with environment variables
        script: |
          flutter build appbundle --release \
            --dart-define=AZURE_TTS_API_KEY=$AZURE_TTS_API_KEY \
            --dart-define=GITHUB_API_KEY=$GITHUB_API_KEY
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.is.tap
      groups:
        - app_credentials
      vars:
        BUNDLE_ID: "com.is.tap"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Regenerate iOS icons without alpha channel
        script: |
          # Install ImageMagick
          brew install imagemagick
          
          # Create a version of the logo without alpha channel
          magick assets/icons/Logo.png -alpha off -background white -flatten assets/icons/Logo_no_alpha.png
          
          # Update pubspec.yaml to use the new icon
          sed -i '' 's|image_path: "assets/icons/Logo.png"|image_path: "assets/icons/Logo_no_alpha.png"|g' pubspec.yaml
          
          # Regenerate icons
          flutter pub get
          flutter pub run flutter_launcher_icons
          
      - name: Set up code signing settings on Xcode project
        script: |
          cd ios
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          cd ios
          pod install
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --dart-define=AZURE_TTS_API_KEY=$AZURE_TTS_API_KEY \
            --dart-define=GITHUB_API_KEY=$GITHUB_API_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App Beta Testers
        submit_to_app_store: false
